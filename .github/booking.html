<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Decoration - Dream Flowers</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:0;
}
.container{
    max-width:700px;
    margin:30px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
h1{
    text-align:center;
    color:#6a0dad;
}
input,select,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}
button{
    width:100%;
    padding:15px;
    background:#25D366;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:#1ea952;
}
</style>
</head>

<body>

<div class="container">

<h1>🌸 Dream Flowers Booking</h1>

<input type="text" id="name" placeholder="पूरा नाम" required>

<input type="tel" id="mobile" placeholder="मोबाइल नंबर" required>

<select id="district">
<option value="">जिला चुनें</option>
<option>शिवहर (Sheohar)</option>
<option>सीतामढ़ी (Sitamarhi)</option>
<option>मुजफ्फरपुर (Muzaffarpur)</option>
<option>पूर्वी चंपारण (Motihari)</option>
</select>

<select id="event">
<option>शादी</option>
<option>बर्थडे</option>
<option>वर्षगांठ</option>
<option>मुंडन</option>
<option>पूजा</option>
<option>अन्य</option>
</select>

<input type="date" id="date">

<textarea id="address" rows="3" placeholder="पूरा पता"></textarea>

<textarea id="message" rows="4" placeholder="अतिरिक्त जानकारी"></textarea>

<button onclick="bookNow()">📲 Book on WhatsApp</button>

</div>

<script>
function bookNow(){

let msg =
`🌸 Dream Flowers Booking

👤 Name: ${document.getElementById("name").value}

📞 Mobile: ${document.getElementById("mobile").value}

📍 District: ${document.getElementById("district").value}

🎉 Event: ${document.getElementById("event").value}

📅 Date: ${document.getElementById("date").value}

🏠 Address: ${document.getElementById("address").value}

💬 Message: ${document.getElementById("message").value}`;

window.open(
"https://wa.me/919525968524?text="+encodeURIComponent(msg),
"_blank"
);

}
</script>

</body>
</html>
